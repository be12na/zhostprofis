<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://script.google.com">
    <link rel="prefetch" href="checkout.html">
    <script src="site.config.js"></script>
    <script src="config.js?v=2026_1"></script>

    <script>
        (function() {
            const CACHE_KEY = 'cepat_global_settings';
            const CACHE_AGE = 60 * 60 * 1000; 

            function syncGlobalSettingsCache(data, timestamp) {
                if (!data) return;
                const cacheApi = window.CEPAT_CACHE || null;
                if (cacheApi && typeof cacheApi.writeEntry === 'function') {
                    cacheApi.writeEntry(CACHE_KEY, data, { tags: ['settings'], time: Number(timestamp || Date.now()) });
                } else {
                    const payload = { data: data, time: Number(timestamp || Date.now()) };
                    try { localStorage.setItem(CACHE_KEY, JSON.stringify(payload)); } catch (e) {}
                }
                applyGlobalSettings(data);
            }

            function applyGlobalSettings(data) {
                // Eksekusi Cepat Favicon
                if(data.site_favicon) {
                    let link = document.querySelector("link[rel~='icon']");
                    if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
                    link.href = data.site_favicon;
                }
                
                // Set Title default saat loading jika ada nama brand
                if(data.site_name) {
                    // Simpan nama brand ke window object agar bisa dipakai saat merender konten CMS
                    window.brandNameGlobal = data.site_name; 
                    if(document.title.includes('Cepat')) {
                        document.title = document.title.replace(/Cepat/gi, data.site_name);
                    }
                }
            }

            const cacheApi = window.CEPAT_CACHE || null;
            const cachedEntry = (cacheApi && typeof cacheApi.readEntry === 'function')
                ? cacheApi.readEntry(CACHE_KEY, { tags: ['settings'], maxAge: CACHE_AGE })
                : null;
            let cached = (cachedEntry && !cachedEntry.missing)
                ? (cachedEntry.payload || { data: cachedEntry.data, time: cachedEntry.time })
                : null;
            if (!cached) {
                const cachedStr = localStorage.getItem(CACHE_KEY);
                try { cached = JSON.parse(cachedStr); } catch(e){}
            }

            if (cached && cached.data) {
                applyGlobalSettings(cached.data);
            }
            window.__CEPAT_GLOBAL_SETTINGS__ = {
                key: CACHE_KEY,
                maxAge: CACHE_AGE,
                cached: cached,
                isFresh: !!(cachedEntry ? !cachedEntry.stale : (cached && cached.time && (Date.now() - cached.time <= CACHE_AGE))),
                apply: applyGlobalSettings,
                sync: syncGlobalSettingsCache
            };
        })();
    </script>
    <title>Memuat Halaman... - Cepat</title>
    <link rel="preload" as="style" href="tailwind.css?v=2026_1">
    <link rel="stylesheet" href="tailwind.css?v=2026_1">
    <script defer src="https://unpkg.com/lucide@0.577.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"></noscript>
    <style>
        body { font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 16px; -webkit-text-size-adjust: 100%; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        a, button { min-height: 48px; touch-action: manipulation; }
        img { content-visibility: auto; }
    </style>
</head>
<body class="bg-white text-slate-800 min-h-screen flex flex-col m-0 p-0 relative">


    <!-- Tombol Kembali Dihilangkan Sesuai Request -->


    <div id="loader" class="flex-1 flex flex-col items-center justify-center min-h-screen bg-[#f8f9fa]">
        <div class="animate-spin w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full mb-4"></div>
        <p class="text-slate-400 font-bold uppercase tracking-widest text-xs animate-pulse">Menyiapkan Tampilan...</p>
    </div>
    
    <div id="page-content" class="hidden w-full flex-1 fade-in"></div>

    <script>
        // SCRIPT_URL sudah ditarik dari config.js
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('s');
        const PAGE_CACHE_AGE = 5 * 60 * 1000;

        function injectMetaPixel(pixelId) {
            if(!pixelId) return;
            if(window.fbq) return; // Prevent double injection

            !function(f,b,e,v,n,t,s)
            {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
            n.callMethod.apply(n,arguments):n.queue.push(arguments)};
            if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
            n.queue=[];t=b.createElement(e);t.async=!0;
            t.src=v;s=b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t,s)}(window, document,'script',
            'https://connect.facebook.net/en_US/fbevents.js');
            
            fbq('init', pixelId);
            fbq('track', 'PageView');

            // Noscript fallback
            const ns = document.createElement('noscript');
            const img = document.createElement('img');
            img.height = 1;
            img.width = 1;
            img.style.display = 'none';
            img.src = `https://www.facebook.com/tr?id=${pixelId}&ev=PageView&noscript=1`;
            ns.appendChild(img);
            document.body.appendChild(ns);
        }

        function renderHTML(data) {
            // Gunakan brandNameGlobal jika ada, kalau tidak fallback ke string kosong
            const brandSufix = window.brandNameGlobal ? ` - ${window.brandNameGlobal}` : '';
            document.title = data.title + brandSufix;
            
            // Inject Pixel jika ada
            if(data.pixel_id) {
                injectMetaPixel(data.pixel_id);
            }

            document.getElementById('loader').style.display = 'none';
            const container = document.getElementById('page-content');
            
            // Fix: Pastikan konten di-set sebelum menghapus hidden agar layout stabil
            container.innerHTML = data.content; 
            container.classList.remove('hidden');
            
            // Apply Theme Mode
            if (data.theme_mode === 'dark') {
                document.body.classList.remove('bg-white', 'text-slate-800');
                document.body.classList.add('bg-slate-900', 'text-slate-100');
            } else {
                // Default Light
                document.body.classList.remove('bg-slate-900', 'text-slate-100');
                document.body.classList.add('bg-white', 'text-slate-800');
            }
            
            // Re-init Icons
            if(window.lucide) lucide.createIcons();
            
            // Fix: Jalankan script jika ada di dalam konten (hati-hati, tapi diperlukan untuk widget/embed)
            const scripts = container.getElementsByTagName('script');
            for(let i=0; i<scripts.length; i++) {
                try {
                    if(scripts[i].src) {
                        const s = document.createElement('script');
                        s.src = scripts[i].src;
                        s.async = true;
                        document.body.appendChild(s);
                    } else {
                        // Gunakan Function constructor daripada eval untuk scope yang lebih aman (sedikit)
                        new Function(scripts[i].innerHTML)();
                    }
                } catch(e) {
                    console.error("Custom Script Error:", e);
                }
            }
        }

        // --> FUNGSI LOADING SAT SET (Optimistic UI & Background Sync)
        async function loadPage() {
            if(!slug) { 
                document.getElementById('loader').innerHTML = '<p class="text-red-500 font-bold text-center mt-20">Error: Halaman tidak ditemukan.</p>'; 
                return; 
            }
            
            const cacheKey = 'cepat_page_' + slug;
            const cacheApi = window.CEPAT_CACHE || null;
            const cachedEntry = (cacheApi && typeof cacheApi.readEntry === 'function')
                ? cacheApi.readEntry(cacheKey, { tags: ['pages'], maxAge: PAGE_CACHE_AGE })
                : null;
            const cachedRaw = (cachedEntry && !cachedEntry.missing)
                ? JSON.stringify(cachedEntry.payload || { data: cachedEntry.data, time: cachedEntry.time })
                : localStorage.getItem(cacheKey);
            const globalCache = window.__CEPAT_GLOBAL_SETTINGS__ || {};
            let cachedData = null;
            let cachedAt = 0;
            try {
                const parsed = cachedRaw ? JSON.parse(cachedRaw) : null;
                if (parsed && typeof parsed === 'object' && parsed.data) {
                    cachedData = parsed.data;
                    cachedAt = Number(parsed.time || 0);
                } else if (parsed && typeof parsed === 'object') {
                    cachedData = parsed;
                }
            } catch (e) { cachedData = null; }
            
            // JIKA ADA CACHE: Tampilkan landing page seketika (0 detik)
            if (cachedData) {
                renderHTML(cachedData);
            }

            const isPageStale = !!(cachedEntry ? cachedEntry.stale : (!cachedAt || ((Date.now() - cachedAt) > PAGE_CACHE_AGE)));
            const isSettingsStale = !globalCache.isFresh;
            if (cachedData && !isPageStale && !isSettingsStale) return;

            // Pengecekan data terbaru di belakang layar
            try {
                if(typeof SCRIPT_URL === 'undefined') throw new Error("config.js tidak ditemukan");

                const requests = [];
                const requestMap = {};
                if (isSettingsStale) {
                    requestMap.settings = requests.push({ action: 'get_global_settings' }) - 1;
                }
                if (!cachedData || isPageStale) {
                    requestMap.page = requests.push({ action: 'get_page_content', slug: slug }) - 1;
                }
                if (!requests.length) return;

                const batch = (window.CEPAT_API && typeof window.CEPAT_API.batch === 'function')
                    ? await window.CEPAT_API.batch(requests)
                    : { status: 'error', results: [] };
                const results = Array.isArray(batch.results) ? batch.results : [];

                if (requestMap.settings !== undefined) {
                    const settingsResult = results[requestMap.settings];
                    if (settingsResult && settingsResult.data && settingsResult.data.status === 'success') {
                        const settingsData = settingsResult.data.data;
                        if (typeof globalCache.sync === 'function') globalCache.sync(settingsData, Date.now());
                        else if (typeof globalCache.apply === 'function') globalCache.apply(settingsData);
                    }
                }

                if (requestMap.page !== undefined) {
                    const pageResult = results[requestMap.page];
                    const r = pageResult && pageResult.data ? pageResult.data : null;
                    if (r && r.status === 'success') {
                        const freshData = JSON.stringify(r);
                        const previousData = cachedData ? JSON.stringify(cachedData) : '';
                        if (previousData !== freshData) {
                            if (cacheApi && typeof cacheApi.writeEntry === 'function') {
                                cacheApi.writeEntry(cacheKey, r, { tags: ['pages'], time: Date.now() });
                            } else {
                                localStorage.setItem(cacheKey, JSON.stringify({ data: r, time: Date.now() }));
                            }
                            renderHTML(r);
                        } else if (cachedAt !== 0) {
                            if (cacheApi && typeof cacheApi.writeEntry === 'function') {
                                cacheApi.writeEntry(cacheKey, cachedData, { tags: ['pages'], time: Date.now() });
                            } else {
                                localStorage.setItem(cacheKey, JSON.stringify({ data: cachedData, time: Date.now() }));
                            }
                        }
                    } else if (!cachedData) {
                        document.getElementById('loader').innerHTML = `<p class="text-red-500 font-bold text-center mt-20">${(r && r.message) || 'Halaman tidak ditemukan.'}</p>`;
                    }
                }
            } catch (e) {
                if (!cachedData) {
                    document.getElementById('loader').innerHTML = '<p class="text-red-500 font-bold text-center mt-20">Gagal terhubung ke server.</p>';
                }
            }
        }
        
        window.onload = () => {
            lucide.createIcons();
            loadPage();
            if (window.CEPAT_CACHE && typeof window.CEPAT_CACHE.watchManifest === 'function' && !window.__CEPAT_PAGE_WATCH__) {
                window.__CEPAT_PAGE_WATCH__ = window.CEPAT_CACHE.watchManifest(function() {
                    loadPage();
                }, { intervalMs: 15000 });
            }
        };
    </script>
</body>
</html>
